<!doctype html>
<html>
<head>
  <title>FleetTracker Status</title>
  <style>
    body { font-family: Verdana, sans-serif; font-size: 12px; margin: 20px; }
    table { border-collapse: collapse; }
    th, td { border: 1px solid #999; padding: 4px 8px; }
    th { background: #ddd; }
    .overdue { background: #fbb; }
    .maintenance { background: #ffd; }
  </style>
</head>
<body>
  <h2>FleetTracker &mdash; Maintenance Status ({{ today }})</h2>
  <table>
    <tr>
      <th>ID</th><th>Model</th><th>Status</th>
      <th>Mileage</th><th>Due date</th><th>Due km</th><th>Prio</th>
    </tr>
    {% for r in rows %}
    <tr class="{{ r.status }}">
      <td>{{ r.id }}</td>
      <td>{{ r.model }}</td>
      <td>{{ r.status }}</td>
      <td>{{ r.mileage_km }}</td>
      <td>{{ r.due_date }}</td>
      <td>{{ r.due_km }}</td>
      <td>{{ r.prio }}</td>
    </tr>
    {% endfor %}
  </table>
  <p><small>FleetTracker v2.4-internal</small></p>
</body>
</html>
