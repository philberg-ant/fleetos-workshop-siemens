<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2436"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="van" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7bb3e0"/>
      <stop offset="100%" stop-color="#5b9bd5"/>
    </linearGradient>
  </defs>

  <!-- app tile -->
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#bg)"/>
  <rect x="8" y="8" width="240" height="240" rx="52" fill="none" stroke="#2e3650" stroke-width="2"/>

  <!-- telemetry arcs -->
  <g stroke="#5b9bd5" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.35">
    <path d="M 70 100 A 82 82 0 0 1 186 100"/>
  </g>
  <g stroke="#5b9bd5" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.65">
    <path d="M 88 112 A 56 56 0 0 1 168 112"/>
  </g>
  <g stroke="#5b9bd5" stroke-width="9" stroke-linecap="round" fill="none">
    <path d="M 106 124 A 30 30 0 0 1 150 124"/>
  </g>

  <!-- van body -->
  <g>
    <path d="M 52 142
             L 52 178
             Q 52 186 60 186
             L 196 186
             Q 204 186 204 178
             L 204 158
             Q 204 152 200 148
             L 178 126
             Q 174 122 168 122
             L 64 122
             Q 52 122 52 134
             Z"
          fill="url(#van)"/>
    <!-- window -->
    <path d="M 158 132 L 172 132 L 190 152 L 158 152 Z" fill="#1a3050"/>
    <!-- body seam -->
    <line x1="148" y1="122" x2="148" y2="186" stroke="#1a3050" stroke-width="3"/>
  </g>

  <!-- wheels -->
  <circle cx="86" cy="186" r="17" fill="#0f1117"/>
  <circle cx="86" cy="186" r="8" fill="#2e3650"/>
  <circle cx="174" cy="186" r="17" fill="#0f1117"/>
  <circle cx="174" cy="186" r="8" fill="#2e3650"/>

  <!-- status dot -->
  <circle cx="200" cy="56" r="10" fill="#f59e0b"/>
</svg>
